name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  

    steps:
      - uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Build image
      - name: Build image
        run: |
          docker build . \
          --file Dockerfile \
          --tag ghcr.io/${{ github.repository_owner }}/chatgptreversed:latest

      # Push image
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/chatgptreversed:latest
