name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Convert repo name to lowercase (IMPORTANT FIX)
      - name: Set lowercase repo name
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 3. Login to GitHub Container Registry
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 4. Build image
      - name: Build image
        run: |
          docker build . \
            --file Dockerfile \
            --tag ghcr.io/${{ steps.repo.outputs.repo }}:latest

      # 5. Push image
      - name: Push image
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}:latest
